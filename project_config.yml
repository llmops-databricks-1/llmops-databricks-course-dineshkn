# Project Configuration for LLMOps Course - Causal Inference Knowledge Base

# Development environment
dev:
  catalog: llmops_dev
  schema: causal_inference
  volume: causal_inference_pdfs
  llm_endpoint: databricks-meta-llama-3-1-70b-instruct  # TODO: create/verify later
  embedding_endpoint: databricks-gte-large-en  # TODO: create/verify later
  warehouse_id: REPLACE_WITH_YOUR_WAREHOUSE_ID  #TODO
  vector_search_endpoint: llmops_course_vs_endpoint  # TODO: create later
  genie_space_id: null  # TODO: create later 

# Acceptance/Staging environment
acc:
  catalog: llmops_dev
  schema: causal_inference
  volume: causal_inference_pdfs
  llm_endpoint: databricks-meta-llama-3-1-70b-instruct
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: REPLACE_WITH_YOUR_WAREHOUSE_ID
  vector_search_endpoint: llmops_course_vs_endpoint
  genie_space_id: null

# Production environment
prd:
  catalog: llmops_prd
  schema: causal_inference
  volume: causal_inference_pdfs
  llm_endpoint: databricks-meta-llama-3-1-70b-instruct
  embedding_endpoint: databricks-gte-large-en
  warehouse_id: REPLACE_WITH_YOUR_WAREHOUSE_ID
  vector_search_endpoint: llmops_course_vs_endpoint
  genie_space_id: null

# Model configuration
model_config:
  temperature: 0.7
  max_tokens: 2000
  top_p: 0.95

# Vector search configuration
vector_search:
  embedding_dimension: 1024
  similarity_metric: cosine
  num_results: 5

# Chunking configuration
chunking:
  chunk_size: 512
  chunk_overlap: 50
  separator: "\n\n"
